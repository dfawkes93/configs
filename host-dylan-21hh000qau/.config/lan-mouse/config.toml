[[clients]]
# lan-mouse resolves `hostname` via unicast DNS (not mDNS), so an mDNS .local
# name does not work here (unlike the pipewire netmic configs). Pi-hole now
# serves the local `.lan` zone, so the FQDN resolves to a clean IPv4 directly —
# no static IP needed. (The bare hostname won't work: resolv.conf has no search
# domain, so the `.lan` suffix must be spelled out.)
hostname = "egg.lan"
position = "left"
activate_on_startup = true

