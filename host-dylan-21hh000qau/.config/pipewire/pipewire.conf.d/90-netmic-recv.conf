# Network microphone — RECEIVER (this laptop).
#
# Listens for the SAP announcement broadcast by `egg` (see the matching
# 90-netmic-send.conf in the host-egg package) and auto-creates a virtual
# Audio/Source named "Network Mic (egg)". Select it as your input in any app
# (Teams, browser, etc.) once egg is sending.
#
# Audio itself arrives as unicast RTP straight to this machine; only the small
# SAP discovery packets use multicast, which keeps it reliable over WiFi.
context.modules = [
    { name = libpipewire-module-rtp-sap
        args = {
            local.ifname = wlan0          # this laptop's interface (`ip route`)
            sap.ip   = 224.0.0.56
            sap.port = 9875
            stream.rules = [
                {
                    # Match egg's announced session by name (see sess.name on the sender).
                    matches = [ { rtp.session = "~NetMic.*" } ]
                    actions = {
                        create-stream = {
                            media.class      = "Audio/Source"
                            node.name        = "netmic.egg"
                            node.description = "Network Mic (egg)"
                            # Receive buffer. Raise (e.g. 100) if you hear dropouts.
                            sess.latency.msec = 50
                        }
                    }
                }
            ]
        }
        # nofail: never let a load failure abort the daemon and kill audio.
        flags = [ nofail ]
    }
]
