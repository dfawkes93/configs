# Network microphone — RECEIVER (this laptop), STATIC UNICAST.
#
# SAP/multicast auto-discovery does NOT survive the TP-Link mesh WiFi (the AP
# drops multicast to wireless clients), so we use a fixed unicast RTP source:
# it binds udp/46000 and accepts whatever egg sends to this machine. The
# virtual "Network Mic (egg)" source appears as soon as PipeWire starts.
#
# source.ip is "::" (dual-stack: bindv6only=0 means this also accepts IPv4)
# rather than 0.0.0.0, so it catches egg's stream regardless of address family.
# In practice egg streams over IPv4 (192.168.1.x): mDNS hands back both an IPv6
# ULA and a link-local, and IPv6 egress is unreliable here (firewalld + the
# link-local needs a scope id), so both machines set gai.conf to prefer IPv4 —
# see /etc/gai.conf: `precedence ::ffff:0:0/96 100`.
#
# Format and port MUST match egg's rtp-sink (S16BE / 48000 / 1ch / 46000).
context.modules = [
    { name = libpipewire-module-rtp-source
        args = {
            source.ip   = "::"           # all IPv6 (dual-stack) — accept from egg
            source.port = 46000
            sess.latency.msec = 50       # raise if you hear dropouts over WiFi
            audio.format   = "S16BE"
            audio.rate     = 48000
            audio.channels = 1
            stream.props = {
                node.name           = "netmic.egg"
                node.description    = "Network Mic (egg)"
                media.class         = "Audio/Source"
                node.always-process = true   # keep the source present even when idle
            }
        }
        # nofail: never let a load failure abort the daemon and kill audio.
        flags = [ nofail ]
    }
]
