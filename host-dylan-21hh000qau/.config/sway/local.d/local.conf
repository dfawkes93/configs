output * bg /home/dylanf/Pictures/Ngc6888Hoo_Aro_2466.jpg fill

# --- AOC dual-monitor desk -------------------------------------------------
output "AOC 2790 APSL69A001340" {
    resolution 1920x1080
    position 0,0
    transform 270
}
output "AOC 27E3 AUBQ69A000160" {
    resolution 1920x1080
    position 1080,0
}
output eDP-1 {
    resolution 1920x1200
    position 3000,0
}

# --- Samsung G9 (clamshell) ------------------------------------------------
# When the G9 is connected we run lid-closed: eDP-1 is disabled by the
# bindswitch rule below, and the G9 is the only active output.
output "Samsung Electric Company LC49G95T HNTW300148" {
    mode 2560x1440@120Hz
    position 0,0
}

# Clamshell: disable the internal panel whenever the lid is shut.
# --reload re-evaluates on config reload, so a lid that is already closed at
# startup is honoured too.
bindswitch --reload --locked lid:on  output eDP-1 disable
bindswitch --reload --locked lid:off output eDP-1 enable

# Workspaces prefer the G9 when present, otherwise fall back to the AOC desk.
workspace 1:Terminal output "Samsung Electric Company LC49G95T HNTW300148" "AOC 2790 APSL69A001340"
workspace 2:Firefox  output "Samsung Electric Company LC49G95T HNTW300148" "AOC 27E3 AUBQ69A000160"
workspace 3:Teams    output "Samsung Electric Company LC49G95T HNTW300148" eDP-1

assign [app_id="Alacritty"] workspace 1:Terminal
assign [app_id="firefox"] workspace 2:Firefox
assign [app_id="teams-for-linux"] workspace 3:Teams

exec uwsm app -- teams-for-linux
exec uwsm app -- firefox
exec uwsm app -- alacritty
