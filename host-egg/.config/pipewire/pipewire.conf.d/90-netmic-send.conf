# Network microphone — SENDER (egg), STATIC UNICAST to the laptop.
#
# No SAP/multicast: the WiFi mesh drops multicast, so audio is streamed straight
# to the laptop's IP. Format/port MUST match the laptop's rtp-source
# (host-dylan-21hh000qau/.config/pipewire/pipewire.conf.d/90-netmic-recv.conf).
#
#   destination.ip = the laptop, resolved via mDNS (.local) so it tracks the
#                    laptop's current address with no DHCP reservation needed.
#                    PipeWire's rtp-sink resolves names through getaddrinfo,
#                    which goes via nss-mdns (mdns_minimal in nsswitch.conf).
#   NOTE: no local.ifname — binding to the device needs privileges the user
#         service lacks (caused "sendmsg: Bad file descriptor"); the kernel
#         routes to the same-subnet laptop fine without it.
context.modules = [
    { name = libpipewire-module-rtp-sink
        args = {
            destination.ip   = dylan-21hh000qau.local
            destination.port = 46000
            sess.name        = "NetMic egg"
            audio.format     = "S16BE"
            audio.rate       = 48000
            audio.channels   = 1
            stream.props = {
                node.name           = "netmic-send"
                node.description    = "Network Mic Send (to laptop)"
                media.class         = "Audio/Sink"
                node.always-process = true
            }
        }
        flags = [ nofail ]
    }
    { name = libpipewire-module-loopback
        args = {
            node.description = "NetMic mic bridge"
            capture.props = {
                node.name = "netmic-bridge-capture"
                stream.capture.sink = false
                # captures egg's default source. To pin a specific mic:
                # target.object = "alsa_input...."   (wpctl status)
            }
            playback.props = {
                node.name     = "netmic-bridge-playback"
                target.object = "netmic-send"
            }
        }
        flags = [ nofail ]
    }
]
