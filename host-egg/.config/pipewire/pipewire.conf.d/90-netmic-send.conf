# Network microphone — SENDER (egg).
#
# Captures egg's default microphone and streams it as RTP to the laptop,
# announcing it over SAP so the laptop auto-creates a matching virtual source
# (see 90-netmic-recv.conf in the host-dylan-21hh000qau package).
#
# BEFORE USE, set the two site-specific values below:
#   * destination.ip  -> the LAPTOP's LAN IP   (reserve it in DHCP so it's stable)
#   * local.ifname    -> egg's wired interface (find with: ip route)
#
# Pieces:
#   rtp-sap   announces the stream so the laptop discovers it
#   rtp-sink  the network sink that puts audio on the wire (unicast -> laptop)
#   loopback  bridges egg's default mic INTO that sink
context.modules = [
    { name = libpipewire-module-rtp-sap
        args = {
            local.ifname = eth0           # <-- egg's interface
            sap.ip   = 224.0.0.56
            sap.port = 9875
            stream.rules = [
                {
                    matches = [ { sess.sap.announce = true } ]
                    actions = { announce-stream = {} }
                }
            ]
        }
        flags = [ nofail ]
    }
    { name = libpipewire-module-rtp-sink
        args = {
            local.ifname     = eth0       # <-- egg's interface
            destination.ip   = 192.168.1.101   # <-- the LAPTOP's LAN IP
            destination.port = 46000
            net.ttl          = 16
            sess.name        = "NetMic egg"    # must match the laptop's rtp.session regex
            audio.format     = "S16BE"
            audio.rate       = 48000
            audio.channels   = 1               # mono is plenty for a mic
            stream.props = {
                node.name         = "netmic-send"
                node.description  = "Network Mic Send (to laptop)"
                media.class       = "Audio/Sink"
                sess.sap.announce = true
            }
        }
        flags = [ nofail ]
    }
    { name = libpipewire-module-loopback
        args = {
            node.description = "NetMic mic bridge"
            capture.props = {
                node.name = "netmic-bridge-capture"
                stream.capture.sink = false
                # Captures egg's CURRENT DEFAULT source. To pin a specific mic,
                # uncomment and set to its node.name (find with: wpctl status):
                # target.object = "alsa_input...."
            }
            playback.props = {
                node.name     = "netmic-bridge-playback"
                target.object = "netmic-send"   # feed the RTP sink above
                node.passive  = true
            }
        }
        flags = [ nofail ]
    }
]
